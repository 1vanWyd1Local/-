<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Учебный Журнал Pro - Система учета успеваемости</title>
  
  <!-- TailwindCSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  
  <!-- Babel for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- XLSX for Excel Export -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    }

    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #f1f1f1;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb {
      background: #c1c1c1;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #a1a1a1;
    }

    thead th {
      position: sticky;
      z-index: 10;
    }

    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    input[type=number] {
      -moz-appearance: textfield;
    }

    .transition-all {
      transition-property: all;
      transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
      transition-duration: 150ms;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .animate-fade-in {
      animation: fadeIn 0.3s ease-out;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    .animate-slide-in {
      animation: slideIn 0.2s ease-out;
    }

    @keyframes pulse-red {
      0%, 100% { background-color: #fee2e2; }
      50% { background-color: #fecaca; }
    }

    .animate-pulse-red {
      animation: pulse-red 2s infinite;
    }

    .news-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    .dropdown-menu {
      position: absolute;
      right: 0;
      top: 100%;
      background: white;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      z-index: 100;
      min-width: 200px;
      margin-top: 8px;
    }

    .nav-item-active {
      background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
      color: white;
      box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.5);
    }

    .nav-item-inactive {
      background: transparent;
      color: #6b7280;
    }

    .nav-item-inactive:hover {
      background: #f3f4f6;
      color: #1f2937;
    }

    .chat-bubble-me {
      background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
      color: white;
      border-radius: 12px 12px 0 12px;
    }

    .chat-bubble-other {
      background: #f3f4f6;
      color: #1f2937;
      border-radius: 12px 12px 12px 0;
    }

    .file-attachment {
      background: rgba(255,255,255,0.2);
      padding: 8px;
      border-radius: 8px;
      margin-top: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
    }
    
    .file-attachment img {
      max-width: 200px;
      max-height: 200px;
      border-radius: 4px;
      display: block;
    }

    .sidebar {
      width: 260px;
      flex-shrink: 0;
    }

    @media (max-width: 768px) {
      .sidebar {
        width: 100%;
        height: auto;
      }
      .main-content {
        width: 100%;
      }
    }

    .status-badge {
      padding: 4px 12px;
      border-radius: 9999px;
      font-size: 12px;
      font-weight: 600;
    }

    .status-active {
      background: #d1fae5;
      color: #059669;
    }

    .status-archived {
      background: #f3f4f6;
      color: #6b7280;
    }

    .status-academic {
      background: #fef3c7;
      color: #d97706;
    }

    .avatar-upload {
      position: relative;
      cursor: pointer;
    }

    .avatar-upload:hover .avatar-overlay {
      opacity: 1;
    }

    .avatar-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.5);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .chat-list-item {
      transition: all 0.2s;
    }

    .chat-list-item:hover {
      background: #f3f4f6;
    }

    .chat-list-item.active {
      background: #dbeafe;
      border-left: 3px solid #3b82f6;
    }

    .message-input {
      resize: none;
      max-height: 150px;
      overflow-y: auto;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    // Initial Data (Empty, no test accounts)
    const initialGroups = [];
    const initialSubjects = [];
    const initialStudents = [];
    const initialSchedule = {};
    const initialBellSchedules = [];
    const initialNews = [];
    const initialMessages = [];

    const studentStatuses = {
      active: { label: 'Активен', color: 'status-active' },
      archived: { label: 'Архив', color: 'status-archived' },
      academic: { label: 'Академ', color: 'status-academic' }
    };

    const absenceReasons = [
      { value: 'illness', label: 'Болезнь (справка)', color: 'bg-green-100' },
      { value: 'valid', label: 'Уважительная причина', color: 'bg-blue-100' },
      { value: 'skip', label: 'Прогул (НП)', color: 'bg-red-100' },
      { value: 'family', label: 'По семейным обстоятельствам', color: 'bg-yellow-100' },
    ];

    const weekDays = ['Понедельник', 'Вторник', 'Среда', 'Четверг', 'Пятница', 'Суббота'];

    // Storage Utilities
    const getFromStorage = (key, initialValue) => {
      try {
        const stored = localStorage.getItem(key);
        if (stored) {
          return JSON.parse(stored);
        }
        localStorage.setItem(key, JSON.stringify(initialValue));
        return initialValue;
      } catch (e) {
        console.error('Storage error:', e);
        return initialValue;
      }
    };

    const saveToStorage = (key, value) => {
      try {
        localStorage.setItem(key, JSON.stringify(value));
      } catch (e) {
        alert('Ошибка сохранения: Превышен лимит хранилища браузера.');
      }
    };

    const getUsers = () => getFromStorage('users', []);

    const saveUser = (user) => {
      const users = getUsers();
      users.push(user);
      saveToStorage('users', users);
    };

    const updateUserInStorage = (updatedUser) => {
      const users = getUsers();
      const index = users.findIndex(u => u.id === updatedUser.id);
      if (index !== -1) {
        users[index] = updatedUser;
        saveToStorage('users', users);
      }
    };

    const deleteUserFromStorage = (userId) => {
      const users = getUsers();
      const newUsers = users.filter(u => u.id !== userId);
      saveToStorage('users', newUsers);
      
      const sessions = getFromStorage('savedSessions', []);
      const newSessions = sessions.filter(s => s.id !== userId);
      saveToStorage('savedSessions', newSessions);

      const portfolios = getFromStorage('portfolios', {});
      delete portfolios[userId];
      saveToStorage('portfolios', portfolios);
    };

    // Login Component
    const LoginPage = ({ onLogin }) => {
      const [username, setUsername] = useState('');
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');

      const handleSubmit = (e) => {
        e.preventDefault();
        const users = getUsers();
        const user = users.find(u => u.username === username && u.password === password);
        if (user) {
          onLogin(user);
        } else {
          setError('Неверное имя пользователя или пароль');
        }
      };

      return (
        <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 flex items-center justify-center p-4">
          <div className="bg-white rounded-2xl shadow-xl p-8 w-full max-w-md animate-slide-in">
            <div className="text-center mb-8">
              <h1 className="text-3xl font-bold text-gray-800 mb-2">📚 Учебный Журнал</h1>
              <p className="text-gray-600">Система учета успеваемости</p>
            </div>

            <form onSubmit={handleSubmit} className="space-y-6">
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-2">Имя пользователя</label>
                <input
                  type="text"
                  value={username}
                  onChange={(e) => setUsername(e.target.value)}
                  className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
                  placeholder="Введите имя пользователя"
                  required
                />
              </div>

              <div>
                <label className="block text-sm font-medium text-gray-700 mb-2">Пароль</label>
                <input
                  type="password"
                  value={password}
                  onChange={(e) => setPassword(e.target.value)}
                  className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
                  placeholder="Введите пароль"
                  required
                />
              </div>

              {error && (
                <div className="bg-red-50 text-red-600 px-4 py-3 rounded-lg text-sm animate-fade-in">{error}</div>
              )}

              <button type="submit" className="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition-colors">Войти</button>
            </form>

            <div className="mt-6 p-4 bg-yellow-50 border border-yellow-200 rounded-lg">
              <p className="text-sm text-yellow-800">
                ℹ️ Регистрация студентов доступна только через преподавателя. Обратитесь к администрации для создания аккаунта.
              </p>
            </div>
          </div>
        </div>
      );
    };

    // Register Component (Teachers only)
    const RegisterPage = ({ onRegister, onShowLogin }) => {
      const [username, setUsername] = useState('');
      const [password, setPassword] = useState('');
      const [confirmPassword, setConfirmPassword] = useState('');
      const [name, setName] = useState('');
      const [error, setError] = useState('');
      const [success, setSuccess] = useState('');

      const handleSubmit = (e) => {
        e.preventDefault();
        setError('');
        setSuccess('');

        if (password !== confirmPassword) {
          setError('Пароли не совпадают');
          return;
        }

        if (password.length < 6) {
          setError('Пароль должен быть не менее 6 символов');
          return;
        }

        const users = getUsers();
        if (users.find(u => u.username === username)) {
          setError('Пользователь с таким именем уже существует');
          return;
        }

        const newUser = {
          id: Date.now(),
          username,
          password,
          role: 'teacher',
          name: name || username,
          avatar: null
        };

        saveUser(newUser);
        setSuccess('Регистрация успешна! Теперь вы можете войти.');
        
        setTimeout(() => {
          onShowLogin();
        }, 1500);
      };

      return (
        <div className="min-h-screen bg-gradient-to-br from-green-50 to-teal-100 flex items-center justify-center p-4">
          <div className="bg-white rounded-2xl shadow-xl p-8 w-full max-w-md animate-slide-in">
            <div className="text-center mb-8">
              <h1 className="text-3xl font-bold text-gray-800 mb-2">Регистрация преподавателя</h1>
              <p className="text-gray-600">Создайте аккаунт преподавателя</p>
            </div>

            <form onSubmit={handleSubmit} className="space-y-4">
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-2">ФИО</label>
                <input
                  type="text"
                  value={name}
                  onChange={(e) => setName(e.target.value)}
                  className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent transition-all"
                  placeholder="Введите ваше ФИО"
                  required
                />
              </div>

              <div>
                <label className="block text-sm font-medium text-gray-700 mb-2">Имя пользователя</label>
                <input
                  type="text"
                  value={username}
                  onChange={(e) => setUsername(e.target.value)}
                  className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent transition-all"
                  placeholder="Придумайте логин"
                  required
                />
              </div>

              <div>
                <label className="block text-sm font-medium text-gray-700 mb-2">Пароль</label>
                <input
                  type="password"
                  value={password}
                  onChange={(e) => setPassword(e.target.value)}
                  className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent transition-all"
                  placeholder="Придумайте пароль"
                  required
                />
              </div>

              <div>
                <label className="block text-sm font-medium text-gray-700 mb-2">Подтверждение пароля</label>
                <input
                  type="password"
                  value={confirmPassword}
                  onChange={(e) => setConfirmPassword(e.target.value)}
                  className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent transition-all"
                  placeholder="Повторите пароль"
                  required
                />
              </div>

              {error && (
                <div className="bg-red-50 text-red-600 px-4 py-3 rounded-lg text-sm animate-fade-in">{error}</div>
              )}

              {success && (
                <div className="bg-green-50 text-green-600 px-4 py-3 rounded-lg text-sm animate-fade-in">{success}</div>
              )}

              <button type="submit" className="w-full bg-green-600 text-white py-3 rounded-lg font-semibold hover:bg-green-700 transition-colors">Зарегистрироваться</button>
            </form>

            <div className="mt-6 text-center">
              <p className="text-gray-600 mb-2">Уже есть аккаунт?</p>
              <button onClick={onShowLogin} className="text-green-600 hover:text-green-800 font-semibold">Войти</button>
            </div>
          </div>
        </div>
      );
    };

    // Sidebar Component
    const Sidebar = ({ activeTab, setActiveTab, isTeacher, user, onLogout, onShowSettings, onShowSwitcher }) => {
      const menuItems = [
        { id: 'journal', label: 'Журнал', icon: '📖' },
        { id: 'schedule', label: 'Расписание', icon: '📅' },
        { id: 'chat', label: 'Чат', icon: '💬' },
        { id: 'portfolio', label: 'Портфолио', icon: '👤' },
        { id: 'news', label: 'Новости', icon: '📰' },
      ];

      if (isTeacher) {
        menuItems.push({ id: 'management', label: 'Управление', icon: '⚙️' });
        menuItems.push({ id: 'archive', label: 'Архив', icon: '🗄' });
      }

      return (
        <div className="sidebar bg-white border-r border-gray-200 flex flex-col h-screen sticky top-0">
          <div className="p-6 border-b border-gray-100">
            <h1 className="text-xl font-bold bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent">
              📚 Учебный Журнал
            </h1>
            <div className="mt-4 flex items-center gap-3">
              <div className="avatar-upload w-10 h-10 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-full flex items-center justify-center text-white font-bold shadow-md overflow-hidden">
                {user.avatar ? (
                  <img src={user.avatar} alt={user.name} className="w-full h-full object-cover" />
                ) : (
                  user.name.charAt(0)
                )}
                <div className="avatar-overlay text-xs">📷</div>
              </div>
              <div className="overflow-hidden">
                <p className="text-sm font-semibold text-gray-800 truncate">{user.name}</p>
                <p className="text-xs text-gray-500 truncate">{user.role === 'teacher' ? 'Преподаватель' : 'Студент'}</p>
              </div>
            </div>
          </div>

          <nav className="flex-1 p-4 space-y-2 overflow-y-auto">
            {menuItems.map(item => (
              <button
                key={item.id}
                onClick={() => setActiveTab(item.id)}
                className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition-all ${
                  activeTab === item.id ? 'nav-item-active' : 'nav-item-inactive'
                }`}
              >
                <span className="text-lg">{item.icon}</span>
                {item.label}
              </button>
            ))}
          </nav>

          <div className="p-4 border-t border-gray-100 space-y-2">
            <button
              onClick={onShowSettings}
              className="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-gray-600 hover:bg-gray-50 transition-all"
            >
              <span className="text-lg">⚙️</span>
              Настройки
            </button>
            <button
              onClick={onShowSwitcher}
              className="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-gray-600 hover:bg-gray-50 transition-all"
            >
              <span className="text-lg">🔄</span>
              Сменить аккаунт
            </button>
            <button
              onClick={onLogout}
              className="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-red-600 hover:bg-red-50 transition-all"
            >
              <span className="text-lg">🚪</span>
              Выйти
            </button>
          </div>
        </div>
      );
    };

    // Password Verification Modal
    const PasswordVerifyModal = ({ isOpen, onClose, onVerify, username }) => {
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');

      if (!isOpen) return null;

      const handleSubmit = () => {
        const users = getUsers();
        const user = users.find(u => u.username === username && u.password === password);
        if (user) {
          onVerify(user);
          setPassword('');
          setError('');
          onClose();
        } else {
          setError('Неверный пароль');
        }
      };

      return (
        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4" onClick={onClose}>
          <div className="bg-white rounded-2xl p-6 w-full max-w-md animate-slide-in" onClick={(e) => e.stopPropagation()}>
            <h3 className="text-xl font-bold text-gray-800 mb-4">🔒 Подтверждение личности</h3>
            <p className="text-gray-600 mb-4">Введите пароль для аккаунта <strong>{username}</strong></p>

            <div className="space-y-4">
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-2">Пароль</label>
                <input
                  type="password"
                  value={password}
                  onChange={(e) => setPassword(e.target.value)}
                  onKeyPress={(e) => e.key === 'Enter' && handleSubmit()}
                  className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                  placeholder="Введите пароль"
                  autoFocus
                />
              </div>

              {error && (
                <div className="bg-red-50 text-red-600 px-4 py-3 rounded-lg text-sm">{error}</div>
              )}

              <div className="flex gap-3">
                <button onClick={onClose} className="flex-1 bg-gray-200 text-gray-700 py-3 rounded-lg font-semibold hover:bg-gray-300">Отмена</button>
                <button onClick={handleSubmit} className="flex-1 bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700">Подтвердить</button>
              </div>
            </div>
          </div>
        </div>
      );
    };

    // Student Status Modal
    const StudentStatusModal = ({ isOpen, onClose, student, onSave }) => {
      const [status, setStatus] = useState(student?.status || 'active');
      const [reason, setReason] = useState('');

      useEffect(() => {
        if (student) {
          setStatus(student.status || 'active');
          setReason(student.statusReason || '');
        }
      }, [student]);

      if (!isOpen || !student) return null;

      const handleSave = () => {
        onSave({
          id: student.id,
          status,
          statusReason: reason,
          statusDate: new Date().toISOString().split('T')[0]
        });
        onClose();
      };

      return (
        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4" onClick={onClose}>
          <div className="bg-white rounded-2xl p-6 w-full max-w-md animate-slide-in" onClick={(e) => e.stopPropagation()}>
            <h3 className="text-xl font-bold text-gray-800 mb-4">Статус студента: {student.name}</h3>

            <div className="space-y-4">
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-2">Статус</label>
                <select
                  value={status}
                  onChange={(e) => setStatus(e.target.value)}
                  className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                >
                  <option value="active">🟢 Активен</option>
                  <option value="academic">🟡 Академический отпуск</option>
                  <option value="archived">⚫ Архив (отчислен/выпуск)</option>
                </select>
              </div>

              <div>
                <label className="block text-sm font-medium text-gray-700 mb-2">
                  {status === 'academic' ? 'Причина академа' : status === 'archived' ? 'Причина' : 'Комментарий'}
                </label>
                <textarea
                  value={reason}
                  onChange={(e) => setReason(e.target.value)}
                  className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent resize-none"
                  rows="3"
                  placeholder="Введите причину..."
                />
              </div>

              <div className="flex gap-3 pt-4">
                <button onClick={onClose} className="flex-1 bg-gray-200 text-gray-700 py-3 rounded-lg font-semibold hover:bg-gray-300">Отмена</button>
                <button onClick={handleSave} className="flex-1 bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700">Сохранить</button>
              </div>
            </div>
          </div>
        </div>
      );
    };

    // Attendance Modal
    const AttendanceModal = ({ isOpen, onClose, student, onSave, currentStatus }) => {
      const [selectedReason, setSelectedReason] = useState(currentStatus?.reason || '');

    // Bell Schedule Modal
    const BellScheduleModal = ({ isOpen, onClose, bellSchedules, onSave, onDelete }) => {
      const [editingId, setEditingId] = useState(null);
      const [name, setName] = useState('');
      const [selectedDays, setSelectedDays] = useState([]);
      const [pairs, setPairs] = useState([{ pair: 1, start: '09:00', end: '10:30' }]);

      useEffect(() => {
        if (!isOpen) {
          setName('');
          setSelectedDays([]);
          setPairs([{ pair: 1, start: '09:00', end: '10:30' }]);
          setEditingId(null);
        }
      }, [isOpen]);

      if (!isOpen) return null;

      const handleAddPair = () => {
        setPairs(prev => [...prev, { pair: prev.length + 1, start: '09:00', end: '10:30' }]);
      };

      const handleRemovePair = (index) => {
        setPairs(prev => prev.filter((_, i) => i !== index));
      };

      const handlePairChange = (index, field, value) => {
        setPairs(prev => prev.map((p, i) => i === index ? { ...p, [field]: value } : p));
      };

      const handleDayToggle = (day) => {
        setSelectedDays(prev => 
          prev.includes(day) ? prev.filter(d => d !== day) : [...prev, day]
        );
      };

      const handleEdit = (schedule) => {
        setEditingId(schedule.id);
        setName(schedule.name);
        setSelectedDays([...schedule.days]);
        setPairs([...schedule.pairs]);
      };

      const handleSave = () => {
        if (name.trim() && pairs.length > 0 && selectedDays.length > 0) {
          onSave({
            id: editingId || Date.now(),
            name: name.trim(),
            days: selectedDays,
            pairs: pairs.map((p, i) => ({ ...p, pair: i + 1 }))
          });
          setName('');
          setSelectedDays([]);
          setPairs([{ pair: 1, start: '09:00', end: '10:30' }]);
          setEditingId(null);
        }
      };

      const handleDelete = (id) => {
        if (confirm('Вы уверены, что хотите удалить это расписание звонков?')) {
          onDelete(id);
        }
      };

      return (
        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4 overflow-y-auto" onClick={onClose}>
          <div className="bg-white rounded-2xl p-6 w-full max-w-4xl my-8 animate-slide-in" onClick={(e) => e.stopPropagation()}>
            <div className="flex items-center justify-between mb-4">
              <h3 className="text-xl font-bold text-gray-800">🔔 Расписание звонков</h3>
              <button onClick={onClose} className="text-gray-500 hover:text-gray-700 text-2xl">×</button>
            </div>

            <div className="bg-gray-50 rounded-lg p-4 mb-4">
              <h4 className="font-semibold text-gray-700 mb-3">
                {editingId ? '✏️ Редактировать расписание' : '➕ Добавить расписание'}
              </h4>
              <div className="space-y-3">
                <input
                  type="text"
                  value={name}
                  onChange={(e) => setName(e.target.value)}
                  placeholder="Название (например: Основное)"
                  className="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                />
                
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-2">Дни недели:</label>
                  <div className="flex flex-wrap gap-2">
                    {weekDays.map(day => (
                      <button
                        key={day}
                        type="button"
                        onClick={() => handleDayToggle(day)}
                        className={`px-3 py-2 rounded-lg text-sm font-medium transition-all ${
                          selectedDays.includes(day)
                            ? 'bg-blue-600 text-white'
                            : 'bg-gray-200 text-gray-700 hover:bg-gray-300'
                        }`}
                      >
                        {day.slice(0, 3)}
                      </button>
                    ))}
                  </div>
                </div>
                
                <div className="space-y-2">
                  <label className="block text-sm font-medium text-gray-700">Пары:</label>
                  {pairs.map((pair, index) => (
                    <div key={index} className="flex gap-2 items-center">
                      <span className="text-sm text-gray-600 w-16">Пара {index + 1}</span>
                      <input
                        type="time"
                        value={pair.start}
                        onChange={(e) => handlePairChange(index, 'start', e.target.value)}
                        className="px-3 py-2 border rounded-lg text-sm"
                      />
                      <span className="text-gray-400">-</span>
                      <input
                        type="time"
                        value={pair.end}
                        onChange={(e) => handlePairChange(index, 'end', e.target.value)}
                        className="px-3 py-2 border rounded-lg text-sm"
                      />
                      {pairs.length > 1 && (
                        <button onClick={() => handleRemovePair(index)} className="text-red-500 hover:text-red-700 p-1">🗑️</button>
                      )}
                    </div>
                  ))}
                  <button onClick={handleAddPair} className="text-blue-600 hover:text-blue-800 text-sm font-semibold">+ Добавить пару</button>
                </div>
              </div>
              <div className="flex gap-2 mt-3">
                <button
                  onClick={handleSave}
                  className="bg-blue-600 text-white px-4 py-2 rounded-lg font-semibold hover:bg-blue-700 transition-colors text-sm"
                  disabled={selectedDays.length === 0}
                >
                  {editingId ? 'Сохранить' : 'Добавить'}
                </button>
                {editingId && (
                  <button
                    onClick={() => {
                      setEditingId(null);

                      setPairs([{ pair: 1, start: '09:00', end: '10:30' }]);

                    <div className="flex items-center justify-between mb-2">
                      <h4 className="font-semibold text-gray-800">{schedule.name}</h4>
                      <div className="flex gap-2">
                        <button onClick={() => handleEdit(schedule)} className="text-blue-600 hover:text-blue-800 text-sm">✏️</button>
                        <button onClick={() => handleDelete(schedule.id)} className="text-red-600 hover:text-red-800 text-sm">🗑️</button>
                      </div>
                    </div>
                    <div className="flex flex-wrap gap-2 mb-2">
                      {schedule.days.map(day => (
                        <span key={day} className="text-xs bg-purple-100 text-purple-800 px-2 py-1 rounded">{day.slice(0, 3)}</span>
                      ))}
                    </div>
                    <div className="flex flex-wrap gap-2">
                      {schedule.pairs.map(pair => (
                        <span key={pair.pair} className="text-xs bg-gray-100 px-2 py-1 rounded">{pair.pair}: {pair.start}-{pair.end}</span>
                      ))}
                    </div>
                  </div>
                ))
              )}
            </div>

            <div className="pt-4 mt-4">
              <button onClick={onClose} className="w-full bg-gray-200 text-gray-700 py-3 rounded-lg font-semibold hover:bg-gray-300 transition-colors">Закрыть</button>

          </div>
        </div>
      );
    };

                <label className="flex items-center gap-2 cursor-pointer">

                  <span className="text-sm text-gray-700">👨‍🏫 Преподаватель</span>

            <div className="overflow-x-auto max-h-96 border rounded-lg">
              <table className="w-full">

                  <tr>
                    {includePersonalInfo && (

                    {includeGrades && gradeColumns.map(column => (
