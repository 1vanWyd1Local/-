                    {includeAttendance && (
                      <th className="px-3 py-2 text-center text-sm font-semibold text-white border border-blue-700">Посещ.</th>
                    )}
                    {includeAverage && (
                      <th className="px-3 py-2 text-center text-sm font-semibold text-white border border-blue-700">Ср. балл</th>
                    )}
                  </tr>
                </thead>
                <tbody>
                  {students.map((student, index) => (
                    <tr key={student.id} className={index % 2 === 0 ? 'bg-white' : 'bg-blue-50'}>
                      {includePersonalInfo && (
                        <td className="px-3 py-2 text-sm font-medium text-gray-800 border border-gray-200 sticky left-0 bg-inherit">{student.name}</td>
                      )}
                      {includeGrades && gradeColumns.map(column => (
                        <td key={column.id} className="px-3 py-2 text-center border border-gray-200">
                          <input
                            type="number"
                            min="0"
                            max={column.maxScore}
                            value={editableGrades[`${student.id}-${column.id}`] || ''}
                            onChange={(e) => handleGradeChange(student.id, column.id, e.target.value)}
                            className="w-14 text-center px-1 py-1 border rounded text-sm focus:ring-2 focus:ring-blue-500"
                            placeholder="-"
                          />
                        </td>
                      ))}
                      {includeAttendance && (
                        <td className="px-3 py-2 text-center border border-gray-200">
                          <span className={`px-2 py-1 rounded text-xs ${attendance[student.id]?.status === 'present' ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}`}>
                            {attendance[student.id]?.status === 'present' ? '✓' : '✗'}
                          </span>
                        </td>
                      )}
                      {includeAverage && (
                        <td className="px-3 py-2 text-center border border-gray-200 font-semibold text-blue-600">
                          {((gradeColumns.reduce((sum, col) => {
                            const g = editableGrades[`${student.id}-${col.id}`];
                            return sum + (g ? parseInt(g) * col.weight : 0);
                          }, 0) / gradeColumns.reduce((sum, col) => sum + col.weight, 0)) || 0).toFixed(2)}
                        </td>
                      )}
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>

            <div className="flex gap-3 pt-4 mt-4">
              <button onClick={onClose} className="flex-1 bg-gray-200 text-gray-700 py-3 rounded-lg font-semibold hover:bg-gray-300 transition-colors">Отмена</button>
              <button onClick={handleConfirm} className="flex-1 bg-gradient-to-r from-green-600 to-emerald-600 text-white py-3 rounded-lg font-semibold hover:from-green-700 hover:to-emerald-700 transition-colors shadow-lg">✅ Экспортировать</button>
            </div>
          </div>
        </div>
      );
    };

    // Schedule Modal
    const ScheduleModal = ({ isOpen, onClose, schedule, onSave, groupId, groupName, subjects, bellSchedules }) => {
      const [localSchedule, setLocalSchedule] = useState([]);
      const [editingId, setEditingId] = useState(null);
      const [editData, setEditData] = useState({ 
        day: 'Понедельник', 
        pairNumber: 1,
        subjectId: '', 
        room: '', 
        bellScheduleId: '' 
      });

      const groupSubjects = useMemo(() => {
        return subjects.filter(s => s.groupId === parseInt(groupId));
      }, [subjects, groupId]);

      const dayBellSchedules = useMemo(() => {
        return bellSchedules.filter(bs => bs.days && bs.days.includes(editData.day));
      }, [bellSchedules, editData.day]);

      useEffect(() => {
        if (isOpen && schedule[groupId]) {
          setLocalSchedule([...schedule[groupId]]);
        }
      }, [isOpen, schedule, groupId]);

      useEffect(() => {
        if (dayBellSchedules.length > 0) {
          const currentIsValid = dayBellSchedules.find(bs => bs.id === editData.bellScheduleId);
          if (!currentIsValid) {
            setEditData(prev => ({ ...prev, bellScheduleId: dayBellSchedules[0].id }));
          }
        } else {
          setEditData(prev => ({ ...prev, bellScheduleId: '' }));
        }
      }, [editData.day, dayBellSchedules]);

      if (!isOpen) return null;

      const handleAdd = () => {
        if (editData.subjectId && editData.bellScheduleId) {
          const bs = bellSchedules.find(b => b.id === editData.bellScheduleId);
          const pairInfo = bs?.pairs[editData.pairNumber - 1];
          
          if (editingId) {
            setLocalSchedule(prev => prev.map(s => s.id === editingId ? { 
              ...editData, 
              id: editingId,
              time: pairInfo ? pairInfo.start : editData.time
            } : s));
            setEditingId(null);
          } else {
            setLocalSchedule(prev => [...prev, { 
              ...editData, 
              id: Date.now(),
              time: pairInfo ? pairInfo.start : editData.time
            }]);
          }
          setEditData({ day: 'Понедельник', pairNumber: 1, subjectId: '', room: '', bellScheduleId: dayBellSchedules[0]?.id || '' });
        }
      };

      const handleEdit = (item) => {
        setEditingId(item.id);
        const bs = bellSchedules.find(b => b.id === item.bellScheduleId);
        const pairNum = bs?.pairs.findIndex(p => p.start === item.time) + 1 || item.pairNumber;
        setEditData({ 
          day: item.day, 
          pairNumber: pairNum,
          subjectId: item.subjectId, 
          room: item.room, 
          bellScheduleId: item.bellScheduleId 
        });
      };

      const handleDelete = (id) => {
        setLocalSchedule(prev => prev.filter(s => s.id !== id));
      };

      const handleSave = () => {
        onSave(groupId, localSchedule);
        onClose();
      };

      const getBellScheduleName = (id) => {
        const bs = bellSchedules.find(b => b.id === parseInt(id));
        return bs ? bs.name : 'Не выбрано';
      };

      const getSubjectName = (id) => {
        const subj = groupSubjects.find(s => s.id === parseInt(id));
        return subj ? subj.name : 'Не выбрано';
      };

      const getPairTime = (bellScheduleId, pairNumber) => {
        const bs = bellSchedules.find(b => b.id === parseInt(bellScheduleId));
        const pair = bs?.pairs[pairNumber - 1];
        return pair ? `${pair.start}-${pair.end}` : '';
      };

      return (
        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4 overflow-y-auto" onClick={onClose}>
          <div className="bg-white rounded-2xl p-6 w-full max-w-4xl my-8 animate-slide-in" onClick={(e) => e.stopPropagation()}>
            <div className="flex items-center justify-between mb-4">
              <h3 className="text-xl font-bold text-gray-800">📅 Расписание: {groupName}</h3>
              <button onClick={onClose} className="text-gray-500 hover:text-gray-700 text-2xl">×</button>
            </div>

            <div className="bg-gradient-to-r from-purple-50 to-indigo-50 rounded-lg p-4 mb-4 border border-purple-200">
              <h4 className="font-semibold text-gray-700 mb-3">
                {editingId ? '✏️ Редактировать занятие' : '➕ Добавить занятие'}
              </h4>
              <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
                <select
                  value={editData.day}
                  onChange={(e) => setEditData({ ...editData, day: e.target.value, bellScheduleId: dayBellSchedules[0]?.id || '' })}
                  className="px-3 py-2 border rounded-lg text-sm focus:ring-2 focus:ring-purple-500"
                >
                  {weekDays.map(day => (
                    <option key={day} value={day}>{day}</option>
                  ))}
                </select>
                <select
                  value={editData.pairNumber}
                  onChange={(e) => setEditData({ ...editData, pairNumber: parseInt(e.target.value) })}
                  className="px-3 py-2 border rounded-lg text-sm focus:ring-2 focus:ring-purple-500"
                >
                  {[1, 2, 3, 4, 5, 6].map(num => (
                    <option key={num} value={num}>{num} пара</option>
                  ))}
                </select>
                <select
                  value={editData.bellScheduleId}
                  onChange={(e) => setEditData({ ...editData, bellScheduleId: parseInt(e.target.value) })}
                  className="px-3 py-2 border rounded-lg text-sm focus:ring-2 focus:ring-purple-500"
                  disabled={dayBellSchedules.length === 0}
                >
                  <option value="">Расписание звонков</option>
                  {dayBellSchedules.map(bs => (
                    <option key={bs.id} value={bs.id}>{bs.name}</option>
                  ))}
                </select>
                <select
                  value={editData.subjectId}
                  onChange={(e) => setEditData({ ...editData, subjectId: parseInt(e.target.value) })}
                  className="px-3 py-2 border rounded-lg text-sm focus:ring-2 focus:ring-purple-500"
                >
                  <option value="">Выберите предмет</option>
                  {groupSubjects.map(subject => (
                    <option key={subject.id} value={subject.id}>{subject.name}</option>
                  ))}
                </select>
                <input
                  type="text"
                  value={editData.room}
                  onChange={(e) => setEditData({ ...editData, room: e.target.value })}
                  placeholder="Аудитория"
                  className="px-3 py-2 border rounded-lg text-sm focus:ring-2 focus:ring-purple-500"
                />
                <div className="flex items-center px-3 py-2 bg-white rounded-lg border text-sm text-gray-600">
                  🕐 {getPairTime(editData.bellScheduleId, editData.pairNumber) || 'Выберите пару'}
                </div>
              </div>
              <div className="flex gap-2 mt-3">
                <button
                  onClick={handleAdd}
                  className="bg-gradient-to-r from-blue-600 to-indigo-600 text-white px-4 py-2 rounded-lg font-semibold hover:from-blue-700 hover:to-indigo-700 transition-colors text-sm shadow-md"
                >
                  {editingId ? 'Сохранить' : 'Добавить'}
                </button>
                {editingId && (
                  <button
                    onClick={() => {
                      setEditingId(null);
                      setEditData({ day: 'Понедельник', pairNumber: 1, subjectId: '', room: '', bellScheduleId: dayBellSchedules[0]?.id || '' });
                    }}
                    className="bg-gray-200 text-gray-700 px-4 py-2 rounded-lg font-semibold hover:bg-gray-300 transition-colors text-sm"
                  >
                    Отмена
                  </button>
                )}
              </div>
            </div>

            <div className="overflow-x-auto">
              <table className="w-full border rounded-lg">
                <thead className="bg-gradient-to-r from-purple-600 to-indigo-600">
                  <tr>
                    <th className="px-3 py-2 text-left text-sm font-semibold text-white border border-purple-700">День</th>
                    <th className="px-3 py-2 text-left text-sm font-semibold text-white border border-purple-700">Пара</th>
                    <th className="px-3 py-2 text-left text-sm font-semibold text-white border border-purple-700">Время</th>
                    <th className="px-3 py-2 text-left text-sm font-semibold text-white border border-purple-700">Предмет</th>
                    <th className="px-3 py-2 text-left text-sm font-semibold text-white border border-purple-700">Аудитория</th>
                    <th className="px-3 py-2 text-left text-sm font-semibold text-white border border-purple-700">Звонки</th>
                    <th className="px-3 py-2 text-center text-sm font-semibold text-white border border-purple-700">Действия</th>
                  </tr>
                </thead>
                <tbody>
                  {localSchedule.length === 0 ? (
                    <tr>
                      <td colSpan="7" className="px-3 py-8 text-center text-gray-500">Расписание пустое. Добавьте занятия выше.</td>
                    </tr>
                  ) : (
                    localSchedule
                      .sort((a, b) => weekDays.indexOf(a.day) - weekDays.indexOf(b.day) || a.pairNumber - b.pairNumber)
                      .map((item, index) => (
                        <tr key={item.id} className={index % 2 === 0 ? 'bg-white' : 'bg-purple-50'}>
                          <td className="px-3 py-2 text-sm border border-gray-200 font-medium">{item.day}</td>
                          <td className="px-3 py-2 text-sm border border-gray-200">
                            <span className="bg-purple-100 text-purple-800 px-2 py-1 rounded text-xs font-semibold">{item.pairNumber}</span>
                          </td>
                          <td className="px-3 py-2 text-sm border border-gray-200">{getPairTime(item.bellScheduleId, item.pairNumber)}</td>
                          <td className="px-3 py-2 text-sm border border-gray-200 font-medium">{getSubjectName(item.subjectId)}</td>
                          <td className="px-3 py-2 text-sm border border-gray-200">{item.room}</td>
                          <td className="px-3 py-2 text-sm border border-gray-200">{getBellScheduleName(item.bellScheduleId)}</td>
                          <td className="px-3 py-2 text-center border border-gray-200">
                            <button onClick={() => handleEdit(item)} className="text-blue-600 hover:text-blue-800 mr-2 text-sm">✏️</button>
                            <button onClick={() => handleDelete(item.id)} className="text-red-600 hover:text-red-800 text-sm">🗑️</button>
                          </td>
                        </tr>
                      ))
                  )}
                </tbody>
              </table>
            </div>

            <div className="flex gap-3 pt-4 mt-4">
              <button onClick={onClose} className="flex-1 bg-gray-200 text-gray-700 py-3 rounded-lg font-semibold hover:bg-gray-300 transition-colors">Отмена</button>
              <button onClick={handleSave} className="flex-1 bg-gradient-to-r from-green-600 to-emerald-600 text-white py-3 rounded-lg font-semibold hover:from-green-700 hover:to-emerald-700 transition-colors shadow-lg">💾 Сохранить расписание</button>
            </div>
          </div>
        </div>
      );
    };

    // News Modal
    const NewsModal = ({ isOpen, onClose, news, onSave, onDelete }) => {
      const [title, setTitle] = useState('');
      const [content, setContent] = useState('');
      const [pinned, setPinned] = useState(false);
      const [isUrgent, setIsUrgent] = useState(false);
      const [editingId, setEditingId] = useState(null);

      if (!isOpen) return null;

      const handleEdit = (item) => {
        setEditingId(item.id);
        setTitle(item.title);
        setContent(item.content);
        setPinned(item.pinned);
        setIsUrgent(item.isUrgent || false);
      };

      const handleSave = () => {
        if (title.trim() && content.trim()) {
          onSave({
            id: editingId || Date.now(),
            title: title.trim(),
            content: content.trim(),
            pinned,
            isUrgent,
            date: new Date().toISOString().split('T')[0],
            author: 'Администратор'
          });
          setTitle('');
          setContent('');
          setPinned(false);
          setIsUrgent(false);
          setEditingId(null);
        }
      };

      const handleDelete = (id) => {
        if (confirm('Вы уверены, что хотите удалить эту новость?')) {
          onDelete(id);
        }
      };

      const handleClose = () => {
        onClose();
        setTitle('');
        setContent('');
        setPinned(false);
        setIsUrgent(false);
        setEditingId(null);
      };

      return (
        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4 overflow-y-auto" onClick={handleClose}>
          <div className="bg-white rounded-2xl p-6 w-full max-w-4xl my-8 animate-slide-in" onClick={(e) => e.stopPropagation()}>
            <div className="flex items-center justify-between mb-4">
              <h3 className="text-xl font-bold text-gray-800">📰 Управление новостями</h3>
              <button onClick={handleClose} className="text-gray-500 hover:text-gray-700 text-2xl">×</button>
            </div>

            <div className="bg-gradient-to-r from-orange-50 to-yellow-50 rounded-lg p-4 mb-4 border border-orange-200">
              <h4 className="font-semibold text-gray-700 mb-3">
                {editingId ? '✏️ Редактировать новость' : '➕ Добавить новость'}
              </h4>
              <div className="space-y-3">
                <input
                  type="text"
                  value={title}
                  onChange={(e) => setTitle(e.target.value)}
                  placeholder="Заголовок"
                  className="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent"
                />
                <textarea
                  value={content}
                  onChange={(e) => setContent(e.target.value)}
                  placeholder="Содержание новости"
                  rows="4"
                  className="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent resize-none"
                />
                <div className="flex gap-4">
                  <label className="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" checked={pinned} onChange={(e) => setPinned(e.target.checked)} className="w-4 h-4 text-orange-600 rounded" />
                    <span className="text-sm text-gray-700">📌 Закрепить новость</span>
                  </label>
                  <label className="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" checked={isUrgent} onChange={(e) => setIsUrgent(e.target.checked)} className="w-4 h-4 text-red-600 rounded" />
                    <span className="text-sm text-red-700 font-semibold">🚨 Срочная новость</span>
                  </label>
                </div>
              </div>
              <div className="flex gap-2 mt-3">
                <button onClick={handleSave} className="bg-gradient-to-r from-orange-600 to-yellow-600 text-white px-4 py-2 rounded-lg font-semibold hover:from-orange-700 hover:to-yellow-700 transition-colors text-sm shadow-md">
                  {editingId ? 'Сохранить' : 'Добавить'}
                </button>
                {editingId && (
                  <button
                    onClick={() => {
                      setEditingId(null);
                      setTitle('');
                      setContent('');
                      setPinned(false);
                      setIsUrgent(false);
                    }}
                    className="bg-gray-200 text-gray-700 px-4 py-2 rounded-lg font-semibold hover:bg-gray-300 transition-colors text-sm"
                  >
                    Отмена
                  </button>
                )}
              </div>
            </div>

            <div className="space-y-3 max-h-96 overflow-y-auto">
              {news.length === 0 ? (
                <p className="text-center text-gray-500 py-8">Новостей пока нет</p>
              ) : (
                news.map((item) => (
                  <div
                    key={item.id}
                    className={`p-4 rounded-lg border news-card transition-all ${
                      item.isUrgent ? 'bg-red-50 border-red-300' :
                      item.pinned ? 'bg-yellow-50 border-yellow-300' : 'bg-white border-gray-200'
                    }`}
                  >
                    <div className="flex items-start justify-between">
                      <div className="flex-1">
                        <div className="flex items-center gap-2 mb-1">
                          {item.isUrgent && <span className="text-red-600 animate-pulse">🚨</span>}
                          {item.pinned && <span className="text-yellow-600">📌</span>}
                          <h4 className="font-semibold text-gray-800">{item.title}</h4>
                        </div>
                        <p className="text-gray-600 text-sm mb-2">{item.content}</p>
                        <div className="flex items-center gap-4 text-xs text-gray-500">
                          <span>📅 {item.date}</span>
                          <span>👤 {item.author}</span>
                        </div>
                      </div>
                      <div className="flex gap-2 ml-4">
                        <button onClick={() => handleEdit(item)} className="text-blue-600 hover:text-blue-800 p-2 hover:bg-blue-50 rounded">✏️</button>
                        <button onClick={() => handleDelete(item.id)} className="text-red-600 hover:text-red-800 p-2 hover:bg-red-50 rounded">🗑️</button>
                      </div>
                    </div>
                  </div>
                ))
              )}
            </div>

            <div className="pt-4 mt-4">
              <button onClick={handleClose} className="w-full bg-gray-200 text-gray-700 py-3 rounded-lg font-semibold hover:bg-gray-300 transition-colors">Закрыть</button>
            </div>
          </div>
        </div>
      );
    };

    // News Display Component
    const NewsDisplay = ({ news }) => {
      const sortedNews = [...news].sort((a, b) => {
        if (a.isUrgent && !b.isUrgent) return -1;
        if (!a.isUrgent && b.isUrgent) return 1;
        if (a.pinned && !b.pinned) return -1;
        if (!a.pinned && b.pinned) return 1;
        return new Date(b.date) - new Date(a.date);
      });

      if (news.length === 0) return null;

      return (
        <div className="bg-white rounded-xl shadow-sm p-6 mb-6 border-t-4 border-orange-400">
          <h3 className="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2">
            <span className="text-2xl">📰</span> Новости
          </h3>
          <div className="space-y-3">
            {sortedNews.slice(0, 3).map(item => (
              <div
                key={item.id}
                className={`p-4 rounded-lg border transition-all hover:shadow-md ${
                  item.isUrgent ? 'bg-gradient-to-r from-red-50 to-orange-50 border-red-300 animate-pulse-red' :
                  item.pinned ? 'bg-gradient-to-r from-yellow-50 to-orange-50 border-yellow-300' : 'bg-gray-50 border-gray-200'
                }`}
              >
                <div className="flex items-center gap-2 mb-1">
                  {item.isUrgent && <span className="text-red-600 font-bold text-xs bg-red-100 px-2 py-1 rounded-full">СРОЧНО</span>}
                  {item.pinned && <span className="text-yellow-600">📌</span>}
                  <h4 className="font-semibold text-gray-800">{item.title}</h4>
                </div>
                <p className="text-gray-600 text-sm">{item.content}</p>
                <div className="text-xs text-gray-500 mt-2">📅 {item.date}</div>
              </div>
            ))}
          </div>
        </div>
      );
    };

    // Chat Component (Full messaging system)
    const ChatComponent = ({ user, allUsers }) => {
      const [messages, setMessages] = useState([]);
      const [newMessage, setNewMessage] = useState('');
      const [attachedFile, setAttachedFile] = useState(null);
      const [selectedChat, setSelectedChat] = useState(null);
      const [chatType, setChatType] = useState('personal'); // 'personal' or 'group'
      const [groupChatName, setGroupChatName] = useState('');
      const [showNewChatModal, setShowNewChatModal] = useState(false);
      const [selectedUsers, setSelectedUsers] = useState([]);
      const messagesEndRef = useRef(null);
      const fileInputRef = useRef(null);

      const teachers = allUsers.filter(u => u.role === 'teacher' || u.role === 'admin');
      const students = allUsers.filter(u => u.role === 'student');
      const currentUserGroup = user.groupId;

      useEffect(() => {
        const storedMessages = getFromStorage('messages', []);
        setMessages(storedMessages);
      }, []);

      useEffect(() => {
        messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
      }, [messages, selectedChat]);

      const getChatId = (chatType, participants) => {
        if (chatType === 'personal') {
          const otherUser = participants.find(u => u.id !== user.id);
          return `personal_${Math.min(user.id, otherUser.id)}_${Math.max(user.id, otherUser.id)}`;
        } else {
          return `group_${participants.map(u => u.id).sort().join('_')}`;
        }
      };

      const getFilteredMessages = () => {
        if (!selectedChat) return [];
        const chatId = getChatId(chatType, selectedChat.participants);
        return messages.filter(m => m.chatId === chatId);
      };

      const filteredMessages = getFilteredMessages();

      const handleFileSelect = (e) => {
        const file = e.target.files[0];
        if (file) {
          if (file.size > 100 * 1024 * 1024) {
            alert('Файл слишком большой! Максимум 100МБ.');
            return;
          }
          const reader = new FileReader();
          reader.onload = (event) => {
            setAttachedFile({
              name: file.name,
              type: file.type,
              data: event.target.result,
              size: file.size
            });
          };
          reader.readAsDataURL(file);
        }
      };

      const handleSend = () => {
        if ((newMessage.trim() || attachedFile) && selectedChat) {
          const chatId = getChatId(chatType, selectedChat.participants);
          const message = {
            id: Date.now(),
            chatId,
            senderId: user.id,
            senderName: user.name,
            senderAvatar: user.avatar,
            text: newMessage.trim(),
            file: attachedFile,
            timestamp: new Date().toISOString(),
            chatType
          };
          
          const updatedMessages = [...messages, message];
          saveToStorage('messages', updatedMessages);
          setMessages(updatedMessages);
          setNewMessage('');
          setAttachedFile(null);
          if (fileInputRef.current) fileInputRef.current.value = '';
        }
      };

      const handleCreateChat = () => {
        if (selectedUsers.length > 0) {
          const participants = [user, ...selectedUsers];
          const newChatType = selectedUsers.length > 1 ? 'group' : 'personal';
          setSelectedChat({ participants, name: groupChatName || (newChatType === 'personal' ? selectedUsers[0].name : groupChatName) });
          setChatType(newChatType);
          setShowNewChatModal(false);
          setSelectedUsers([]);
          setGroupChatName('');
        }
      };

      const formatTime = (isoString) => {
        const date = new Date(isoString);
        return date.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
      };

      const formatFileSize = (bytes) => {
        if (bytes === 0) return '0 Bytes';
        const k = 1024;
        const sizes = ['Bytes', 'KB', 'MB', 'GB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
      };

      const getAvailableUsers = () => {
        if (user.role === 'teacher' || user.role === 'admin') {
          return allUsers.filter(u => u.id !== user.id);
        } else {
          // Students can message teachers and students in their group
          return allUsers.filter(u => u.id !== user.id && (u.role === 'teacher' || u.role === 'admin' || u.groupId === currentUserGroup));
        }
      };

      return (
        <div className="bg-white rounded-xl shadow-lg h-[600px] flex border-t-4 border-blue-500 overflow-hidden">
          {/* Chat List Sidebar */}
          <div className="w-80 border-r border-gray-200 flex flex-col">
            <div className="p-4 border-b border-gray-100">
              <h2 className="text-lg font-bold text-gray-800 mb-3">💬 Сообщения</h2>
              <button
                onClick={() => setShowNewChatModal(true)}
                className="w-full bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition-colors text-sm font-semibold"
              >
                + Новый чат
              </button>
            </div>
            <div className="flex-1 overflow-y-auto">
              {messages.length === 0 ? (
                <p className="text-center text-gray-400 py-8 text-sm">Нет сообщений</p>
              ) : (
                // Show unique chats
                [...new Set(messages.map(m => m.chatId))].map(chatId => {
                  const chatMessages = messages.filter(m => m.chatId === chatId);
                  const lastMessage = chatMessages[chatMessages.length - 1];
                  const isGroup = chatId.startsWith('group_');
                  const otherParticipants = lastMessage ? 
                    (isGroup ? 'Групповой чат' : allUsers.find(u => u.id !== lastMessage.senderId)?.name) : 'Чат';
                  
                  return (
                    <div
                      key={chatId}
                      onClick={() => {
                        const participants = isGroup ? 
                          allUsers.filter(u => chatId.includes(u.id.toString())) :
                          [user, allUsers.find(u => chatId.includes(u.id.toString()))];
                        setSelectedChat({ participants, name: otherParticipants });
                        setChatType(isGroup ? 'group' : 'personal');
                      }}
                      className={`chat-list-item p-4 border-b border-gray-100 cursor-pointer ${selectedChat && getChatId(chatType, selectedChat.participants) === chatId ? 'active' : ''}`}
                    >
                      <div className="flex items-center gap-3">
                        <div className="w-10 h-10 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-full flex items-center justify-center text-white font-bold">
                          {otherParticipants.charAt(0)}
                        </div>
                        <div className="flex-1 overflow-hidden">
                          <p className="font-semibold text-gray-800 truncate">{otherParticipants}</p>
                          <p className="text-xs text-gray-500 truncate">{lastMessage?.text || lastMessage?.file ? '📎 Вложение' : ''}</p>
                        </div>
                      </div>
                    </div>
                  );
                })
              )}
            </div>
          </div>

          {/* Chat Area */}
          <div className="flex-1 flex flex-col">
            {selectedChat ? (
              <>
                <div className="p-4 border-b border-gray-100 flex items-center justify-between">
                  <div className="flex items-center gap-3">
                    <div className="w-10 h-10 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-full flex items-center justify-center text-white font-bold">
                      {selectedChat.name.charAt(0)}
                    </div>
                    <div>
                      <h3 className="font-bold text-gray-800">{selectedChat.name}</h3>
                      <p className="text-xs text-gray-500">{chatType === 'group' ? 'Групповой чат' : 'Личная переписка'}</p>
                    </div>
                  </div>
                </div>

                <div className="flex-1 overflow-y-auto p-4 space-y-3 bg-gray-50">
                  {filteredMessages.length === 0 ? (
                    <div className="text-center text-gray-400 mt-20">
                      <p>Нет сообщений</p>
                      <p className="text-sm">Напишите первое сообщение!</p>
                    </div>
                  ) : (
                    filteredMessages.map((msg) => {
                      const isMe = msg.senderId === user.id;
                      return (
                        <div key={msg.id} className={`flex ${isMe ? 'justify-end' : 'justify-start'}`}>
                          <div className={`max-w-[70%] p-3 ${isMe ? 'chat-bubble-me' : 'chat-bubble-other'}`}>
                            {!isMe && chatType === 'group' && (
                              <p className="text-xs font-semibold mb-1 opacity-80">{msg.senderName}</p>
                            )}
                            {msg.text && <p className="text-sm mb-1">{msg.text}</p>}
                            {msg.file && (
                              <div className="file-attachment">
                                {msg.file.type.startsWith('image/') ? (
                                  <img src={msg.file.data} alt="Attached" />
                                ) : (
                                  <div className="flex items-center gap-2">
                                    <span>📎</span>
                                    <div className="flex flex-col">
                                      <span className="font-medium truncate max-w-[150px]">{msg.file.name}</span>
                                      <span className="text-xs opacity-70">{formatFileSize(msg.file.size)}</span>
                                    </div>
                                    <a href={msg.file.data} download={msg.file.name} className="ml-auto text-xs bg-white/20 px-2 py-1 rounded hover:bg-white/30">Скачать</a>
                                  </div>
                                )}
                              </div>
                            )}
                            <p className="text-xs opacity-60 mt-1 text-right">{formatTime(msg.timestamp)}</p>
                          </div>
                        </div>
                      );
                    })
                  )}
                  <div ref={messagesEndRef} />
                </div>

                {attachedFile && (
                  <div className="mx-4 mb-2 p-2 bg-blue-50 border border-blue-200 rounded-lg flex items-center justify-between text-sm text-blue-800">
                    <span>📎 {attachedFile.name} ({formatFileSize(attachedFile.size)})</span>
                    <button onClick={() => { setAttachedFile(null); if(fileInputRef.current) fileInputRef.current.value = ''; }} className="text-red-500 hover:text-red-700 font-bold">×</button>
                  </div>
                )}

                <div className="p-4 border-t border-gray-100 flex gap-2">
                  <input type="file" ref={fileInputRef} onChange={handleFileSelect} className="hidden" accept="image/*,.pdf,.doc,.docx,.txt" />
                  <button onClick={() => fileInputRef.current.click()} className="bg-gray-200 text-gray-700 px-4 py-3 rounded-lg hover:bg-gray-300 transition-colors" title="Прикрепить файл">📎</button>
                  <textarea
                    value={newMessage}
                    onChange={(e) => setNewMessage(e.target.value)}
                    onKeyPress={(e) => e.key === 'Enter' && !e.shiftKey && (e.preventDefault(), handleSend())}
                    placeholder="Введите сообщение..."
                    className="flex-1 px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent message-input"
                    rows="1"
                  />
                  <button onClick={handleSend} className="bg-gradient-to-r from-blue-600 to-indigo-600 text-white px-6 py-3 rounded-lg font-semibold hover:from-blue-700 hover:to-indigo-700 transition-all shadow-md">➤</button>
                </div>
              </>
            ) : (
              <div className="flex-1 flex items-center justify-center text-gray-400">
                <div className="text-center">
                  <p className="text-4xl mb-4">💬</p>
                  <p className="text-lg">Выберите чат или создайте новый</p>
                </div>
              </div>
            )}
          </div>

          {/* New Chat Modal */}
          {showNewChatModal && (
            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4" onClick={() => setShowNewChatModal(false)}>
              <div className="bg-white rounded-2xl p-6 w-full max-w-md animate-slide-in" onClick={(e) => e.stopPropagation()}>
                <h3 className="text-xl font-bold text-gray-800 mb-4">➕ Новый чат</h3>
                
                <div className="space-y-4">
                  <div>
                    <label className="block text-sm font-medium text-gray-700 mb-2">Название (для группового чата)</label>
                    <input
                      type="text"
                      value={groupChatName}
                      onChange={(e) => setGroupChatName(e.target.value)}
                      className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                      placeholder="Введите название"
                    />
                  </div>

                  <div>
                    <label className="block text-sm font-medium text-gray-700 mb-2">Выберите участников</label>
                    <div className="space-y-2 max-h-60 overflow-y-auto border rounded-lg p-2">
                      {getAvailableUsers().map(u => (
                        <label key={u.id} className="flex items-center gap-3 p-2 hover:bg-gray-50 rounded-lg cursor-pointer">
                          <input
                            type="checkbox"
                            checked={selectedUsers.find(s => s.id === u.id)}
                            onChange={(e) => {
                              if (e.target.checked) {
                                setSelectedUsers([...selectedUsers, u]);
                              } else {
                                setSelectedUsers(selectedUsers.filter(s => s.id !== u.id));
                              }
                            }}
                            className="w-4 h-4 text-blue-600 rounded"
                          />
                          <div className="w-8 h-8 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-full flex items-center justify-center text-white text-sm font-bold">
                            {u.name.charAt(0)}
                          </div>
                          <div className="flex-1">
                            <p className="font-medium text-sm">{u.name}</p>
                            <p className="text-xs text-gray-500">{u.role === 'teacher' ? 'Преподаватель' : 'Студент'}</p>
                          </div>
                        </label>
                      ))}
                    </div>
                  </div>

                  <div className="flex gap-3 pt-4">
                    <button onClick={() => setShowNewChatModal(false)} className="flex-1 bg-gray-200 text-gray-700 py-3 rounded-lg font-semibold hover:bg-gray-300">Отмена</button>
                    <button onClick={handleCreateChat} className="flex-1 bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700">Создать</button>
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    // Portfolio Component
    const PortfolioComponent = ({ user, onUpdateUser }) => {
      const [portfolio, setPortfolio] = useState({ about: '', skills: '', achievements: '', files: [] });
      const [isEditing, setIsEditing] = useState(false);
      const [editData, setEditData] = useState({ about: '', skills: '', achievements: '', files: [] });
      const [newFile, setNewFile] = useState(null);
      const [newAvatar, setNewAvatar] = useState(null);
      const fileInputRef = useRef(null);
      const avatarInputRef = useRef(null);

      useEffect(() => {
        const portfolios = getFromStorage('portfolios', {});
        const userPortfolio = portfolios[user.id] || { about: '', skills: '', achievements: '', files: [] };
        setPortfolio(userPortfolio);
        setEditData(userPortfolio);
      }, [user.id]);

      const handleFileSelect = (e) => {
        const file = e.target.files[0];
        if (file) {
          if (file.size > 5 * 1024 * 1024) {
            alert('Файл слишком большой для портфолио! Максимум 5МБ.');
            return;
          }
          const reader = new FileReader();
          reader.onload = (event) => {
            setNewFile({
              name: file.name,
              type: file.type,
              data: event.target.result,
              date: new Date().toLocaleDateString()
            });
          };
          reader.readAsDataURL(file);
        }
      };

      const handleAvatarSelect = (e) => {
        const file = e.target.files[0];
        if (file) {
          if (file.size > 2 * 1024 * 1024) {
            alert('Аватарка слишком большая! Максимум 2МБ.');
            return;
          }
          const reader = new FileReader();
          reader.onload = (event) => {
            setNewAvatar(event.target.result);
          };
          reader.readAsDataURL(file);
        }
      };

      const handleAddFile = () => {
        if (newFile) {
          setEditData(prev => ({ ...prev, files: [...prev.files, newFile] }));
          setNewFile(null);
          if (fileInputRef.current) fileInputRef.current.value = '';
        }
      };

      const handleRemoveFile = (index) => {
        setEditData(prev => ({ ...prev, files: prev.files.filter((_, i) => i !== index) }));
      };

      const handleSave = () => {
        const portfolios = getFromStorage('portfolios', {});
        try {
          const testStorage = JSON.stringify({ ...portfolios, [user.id]: editData });
          if (testStorage.length > 4000000) {
             throw new Error("QuotaExceededError");
          }
          portfolios[user.id] = editData;
          saveToStorage('portfolios', portfolios);
          setPortfolio(editData);
          
          // Save avatar if changed
          if (newAvatar) {
            const updatedUser = { ...user, avatar: newAvatar };
            updateUserInStorage(updatedUser);
            onUpdateUser(updatedUser);
          }
          
          setIsEditing(false);
          setNewAvatar(null);
        } catch (e) {
          alert('Ошибка: Превышен лимит хранилища.');
        }
      };

      return (
        <div className="bg-white rounded-xl shadow-lg p-6 border-t-4 border-indigo-500">
          <div className="flex items-center justify-between mb-6">
            <div className="flex items-center gap-4">
              <div 
                className="avatar-upload w-20 h-20 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-full flex items-center justify-center text-white text-3xl font-bold shadow-lg overflow-hidden"
                onClick={() => isEditing && avatarInputRef.current.click()}
              >
                {newAvatar ? (
                  <img src={newAvatar} alt="New avatar" className="w-full h-full object-cover" />
                ) : user.avatar ? (
                  <img src={user.avatar} alt={user.name} className="w-full h-full object-cover" />
                ) : (
                  user.name.charAt(0)
                )}
                {isEditing && <div className="avatar-overlay text-xs">📷</div>}
                <input ref={avatarInputRef} type="file" onChange={handleAvatarSelect} className="hidden" accept="image/*" />
              </div>
              <div>
                <h2 className="text-2xl font-bold text-gray-800">{user.name}</h2>
                <p className="text-gray-500">{user.role === 'teacher' ? 'Преподаватель' : user.role === 'student' ? 'Студент' : 'Администратор'}</p>
              </div>
            </div>
            {isEditing ? (
              <div className="flex gap-2">
                <button onClick={() => { setIsEditing(false); setNewAvatar(null); }} className="bg-gray-200 text-gray-700 px-4 py-2 rounded-lg hover:bg-gray-300">Отмена</button>
                <button onClick={handleSave} className="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700">Сохранить</button>
              </div>
            ) : (
              <button onClick={() => setIsEditing(true)} className="bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700 transition-colors shadow-md">✏️ Редактировать</button>
            )}
          </div>

          <div className="space-y-6">
            <div>
              <h3 className="text-lg font-bold text-gray-700 mb-2 flex items-center gap-2">📝 О себе</h3>
              {isEditing ? (
                <textarea value={editData.about} onChange={(e) => setEditData({ ...editData, about: e.target.value })} className="w-full p-3 border rounded-lg focus:ring-2 focus:ring-indigo-500" rows="3" placeholder="Расскажите о себе..." />
              ) : (
                <p className="text-gray-600 bg-gray-50 p-4 rounded-lg">{portfolio.about || 'Информация не заполнена'}</p>
              )}
            </div>

            <div>
              <h3 className="text-lg font-bold text-gray-700 mb-2 flex items-center gap-2">🛠 Навыки</h3>
              {isEditing ? (
                <textarea value={editData.skills} onChange={(e) => setEditData({ ...editData, skills: e.target.value })} className="w-full p-3 border rounded-lg focus:ring-2 focus:ring-indigo-500" rows="2" placeholder="Перечислите ваши навыки через запятую..." />
              ) : (
                <div className="flex flex-wrap gap-2">
                  {portfolio.skills ? portfolio.skills.split(',').map((skill, i) => (
                    <span key={i} className="bg-indigo-100 text-indigo-800 px-3 py-1 rounded-full text-sm font-medium">{skill.trim()}</span>
                  )) : <p className="text-gray-400">Не указано</p>}
                </div>
              )}
            </div>

            <div>
              <h3 className="text-lg font-bold text-gray-700 mb-2 flex items-center gap-2">🏆 Достижения</h3>
              {isEditing ? (
                <textarea value={editData.achievements} onChange={(e) => setEditData({ ...editData, achievements: e.target.value })} className="w-full p-3 border rounded-lg focus:ring-2 focus:ring-indigo-500" rows="3" placeholder="Ваши награды и достижения..." />
              ) : (
                <p className="text-gray-600 bg-gray-50 p-4 rounded-lg">{portfolio.achievements || 'Информация не заполнена'}</p>
              )}
            </div>

            <div>
              <h3 className="text-lg font-bold text-gray-700 mb-2 flex items-center gap-2">📎 Файлы</h3>
              {isEditing ? (
                <div className="space-y-3">
                  <div className="flex gap-2 items-center">
                    <input type="file" ref={fileInputRef} onChange={handleFileSelect} className="flex-1 p-2 border rounded-lg text-sm" />
                    <button onClick={handleAddFile} disabled={!newFile} className="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 disabled:opacity-50">Добавить</button>
                  </div>
                  {newFile && <p className="text-sm text-blue-600">Готов к добавлению: {newFile.name}</p>}
                  <div className="space-y-2 mt-4">
                    {editData.files.map((file, index) => (
                      <div key={index} className="flex items-center justify-between p-3 bg-gray-50 rounded-lg border">
                        <div className="flex items-center gap-3">
                          <span className="text-2xl">📄</span>
                          <div>
                            <p className="font-medium text-sm">{file.name}</p>
                            <p className="text-xs text-gray-500">{file.date}</p>
                          </div>
                        </div>
                        <div className="flex items-center gap-2">
                          <a href={file.data} download={file.name} className="text-blue-600 hover:text-blue-800 text-sm">Скачать</a>
                          <button onClick={() => handleRemoveFile(index)} className="text-red-500 hover:text-red-700">🗑️</button>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              ) : (
                <div className="space-y-2">
                  {portfolio.files && portfolio.files.length > 0 ? (
                    portfolio.files.map((file, index) => (
                      <div key={index} className="flex items-center justify-between p-3 bg-gray-50 rounded-lg border">
                        <div className="flex items-center gap-3">
                          <span className="text-2xl">📄</span>
                          <div>
                            <p className="font-medium text-sm">{file.name}</p>
                            <p className="text-xs text-gray-500">{file.date}</p>
                          </div>
                        </div>
                        <a href={file.data} download={file.name} className="text-blue-600 hover:text-blue-800 text-sm bg-blue-50 px-3 py-1 rounded">Скачать</a>
                      </div>
                    ))
                  ) : (
                    <p className="text-gray-400">Файлов нет</p>
                  )}
                </div>
              )}
            </div>
          </div>
        </div>
      );
    };

    // Settings / Account Management Component
    const AccountSettings = ({ user, onLogout, onDeleteAccount, allUsers, onDeleteStudent }) => {
      const isStudent = user.role === 'student';
      const studentsList = allUsers.filter(u => u.role === 'student');

      return (
        <div className="bg-white rounded-xl shadow-lg p-6 border-t-4 border-red-500">
          <h2 className="text-2xl font-bold text-gray-800 mb-6">⚙️ Настройки аккаунта</h2>
          
          <div className="space-y-6">
            <div className="p-4 bg-gray-50 rounded-lg">
              <h3 className="font-semibold text-gray-700 mb-2">Текущий пользователь</h3>
              <p className="text-gray-600">Имя: {user.name}</p>
              <p className="text-gray-600">Логин: {user.username}</p>
              <p className="text-gray-600">Роль: {user.role}</p>
            </div>

            {!isStudent && studentsList.length > 0 && (
              <div className="border-t pt-6">
                <h3 className="text-orange-600 font-bold mb-2">👨‍🎓 Управление студентами</h3>
                <p className="text-sm text-gray-500 mb-4">Только преподаватель может удалять аккаунты студентов.</p>
                <div className="space-y-2 max-h-60 overflow-y-auto">
                  {studentsList.map(student => (
                    <div key={student.id} className="flex items-center justify-between p-3 bg-gray-50 rounded-lg border">
                      <div>
                        <p className="font-medium">{student.name}</p>
                        <p className="text-xs text-gray-500">{student.username}</p>
                      </div>
                      <button
                        onClick={() => {
                          if(confirm(`Вы уверены, что хотите удалить студента ${student.name}?`)) {
                            onDeleteStudent(student.id);
                          }
                        }}
                        className="bg-red-100 text-red-600 px-3 py-1 rounded-lg text-sm font-semibold hover:bg-red-200"
                      >
                        Удалить
                      </button>
                    </div>

                }
                ws[addr].s = rowStyle;

            }

            const scheduleRange = XLSX.utils.decode_range(wsSchedule['!ref']);

            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4" onClick={() => setShowSwitcher(false)}>
              <div className="bg-white rounded-2xl p-6 w-full max-w-md animate-slide-in" onClick={(e) => e.stopPropagation()}>
                <h3 className="text-xl font-bold text-gray-800 mb-4">🔄 Сменить аккаунт</h3>
                <p className="text-sm text-gray-500 mb-4">Выберите сохраненную сессию для быстрого входа</p>
                <div className="space-y-2 max-h-60 overflow-y-auto mb-4">
                  {savedSessions.length === 0 ? (
                    <p className="text-center text-gray-400 py-4">Нет сохраненных сессий</p>
                  ) : (
                    savedSessions.map(session => (
                      <div key={session.id} className="flex items-center justify-between p-3 rounded-lg border hover:bg-gray-50 transition-colors">
                        <button
                          onClick={() => handleRequestSwitch(session)}
                          className="flex-1 text-left"
                        >
                          <div className="font-medium">{session.name}</div>
                          <div className="text-xs text-gray-500">{session.username} ({session.role})</div>
                        </button>
                        <button
                          onClick={() => onRemoveSession(session.id)}
                          className="text-red-500 hover:text-red-700 p-2"
                          title="Удалить сессию"
                        >
                          🗑️
                        </button>
                      </div>
                    ))
                  )}
                </div>
                <button onClick={() => setShowSwitcher(false)} className="w-full bg-gray-200 text-gray-700 py-3 rounded-lg font-semibold hover:bg-gray-300 transition-colors">Закрыть</button>
              </div>
            </div>
          )}

          <PasswordVerifyModal 
            isOpen={showPasswordVerify} 
            onClose={() => { setShowPasswordVerify(false); setPendingSwitchUser(null); }} 
            onVerify={handleVerifiedSwitch}
            username={pendingSwitchUser?.username}
          />
        </div>
      );
    };

    // Main App Component
    const App = () => {
      const [user, setUser] = useState(null);
      const [showRegister, setShowRegister] = useState(false);
      const [allUsers, setAllUsers] = useState([]);
      const [savedSessions, setSavedSessions] = useState([]);

      useEffect(() => {
        const savedUser = localStorage.getItem('currentUser');
        if (savedUser) {
          setUser(JSON.parse(savedUser));
        }
        const users = getUsers();
        setAllUsers(users);
        
        const sessions = getFromStorage('savedSessions', []);
        setSavedSessions(sessions);

        getFromStorage('groups', initialGroups);
        getFromStorage('students', initialStudents);
        getFromStorage('subjects', initialSubjects);
        getFromStorage('schedule', initialSchedule);
        getFromStorage('bellSchedules', initialBellSchedules);
        getFromStorage('news', initialNews);
        getFromStorage('messages', initialMessages);
      }, []);

      const handleLogin = (userData) => {
        setUser(userData);
        localStorage.setItem('currentUser', JSON.stringify(userData));
        
        const sessions = getFromStorage('savedSessions', []);
        if (!sessions.find(s => s.id === userData.id)) {
          const sessionData = { ...userData };
          sessions.push(sessionData);
          saveToStorage('savedSessions', sessions);
          setSavedSessions(sessions);
        }
      };

      const handleLogout = () => {
        setUser(null);
        localStorage.removeItem('currentUser');
      };

      const handleSwitchAccount = (userData) => {
        setUser(userData);
        localStorage.setItem('currentUser', JSON.stringify(userData));
      };

      const handleRemoveSession = (sessionId) => {
        const sessions = savedSessions.filter(s => s.id !== sessionId);
        saveToStorage('savedSessions', sessions);
        setSavedSessions(sessions);
        
        if (user && user.id === sessionId) {
          handleLogout();
        }
      };

      const handleDeleteAccount = () => {
        if (user) {
          deleteUserFromStorage(user.id);
          handleRemoveSession(user.id);
          handleLogout();
          alert('Аккаунт успешно удален.');
          setAllUsers(getUsers());
        }
      };

      const handleDeleteStudent = (studentId) => {
        deleteUserFromStorage(studentId);
        setAllUsers(getUsers());
        const students = getFromStorage('students', initialStudents);
        const newStudents = students.filter(s => s.id !== studentId);
        saveToStorage('students', newStudents);
        alert('Студент удален.');
      };

      const handleUpdateUser = (updatedUser) => {
        setUser(updatedUser);
        updateUserInStorage(updatedUser);
        localStorage.setItem('currentUser', JSON.stringify(updatedUser));
        // Update in allUsers state
        setAllUsers(getUsers());
      };

      if (!user) {
        if (showRegister) {
          return <RegisterPage onRegister={() => {}} onShowLogin={() => setShowRegister(false)} />;
        }
        return <LoginPage onLogin={handleLogin} onShowRegister={() => setShowRegister(true)} />;
      }

      return <Dashboard user={user} onLogout={handleLogout} onSwitchAccount={handleSwitchAccount} allUsers={allUsers} savedSessions={savedSessions} onRemoveSession={handleRemoveSession} onDeleteAccount={handleDeleteAccount} onDeleteStudent={handleDeleteStudent} onUpdateUser={handleUpdateUser} />;
    };

    // Render
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
